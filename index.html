<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>ネットワークノート</title>
  <style>
    :root{
      /* Sakura pink theme */
      --bg:#fff7fb;
      --card:#ffffff;
      --border:#f3c7d7;
      --text:#1f2937;
      --muted:#8b5a6b;

      --me:#ffe6f0;         /* my bubble */
      --meBorder:#f7b7cf;

      --ai:#ffffff;         /* partner bubble */
      --aiBorder:#f3c7d7;

      --accent:#ff7fb0;     /* main pink */
      --accent2:#ffb6d1;    /* light pink */
      --shadow: 0 10px 26px rgba(255,127,176,.18);
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
      background:radial-gradient(1200px 700px at 20% 0%, rgba(255,182,209,.35), transparent 55%),
                 radial-gradient(900px 600px at 90% 20%, rgba(255,127,176,.22), transparent 60%),
                 var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width: 820px;
      margin: 0 auto;
      padding: 14px 14px calc(14px + env(safe-area-inset-bottom));
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }

    .title{
      display:flex; flex-direction:column; gap:2px;
    }
    .title h1{
      font-size:18px; margin:0; line-height:1.2;
      letter-spacing:.2px;
    }
    .title .sub{
      font-size:12px; color:var(--muted);
    }

    .actions{display:flex; gap:8px;}
    .ghost{
      border:1px solid var(--border);
      background:rgba(255,255,255,.7);
      padding:8px 10px;
      border-radius:999px;
      font-size:13px;
      cursor:pointer;
    }

    .card{
      background:linear-gradient(180deg, rgba(255,255,255,.95), rgba(255,255,255,.88));
      border:1px solid rgba(243,199,215,.75);
      border-radius:18px;
      overflow:hidden;
      box-shadow: var(--shadow);
      backdrop-filter: blur(6px);
    }

    .log{
      height: 64vh;
      overflow:auto;
      padding: 14px;
      background:
        radial-gradient(600px 260px at 20% 0%, rgba(255,182,209,.18), transparent 60%),
        radial-gradient(500px 240px at 80% 10%, rgba(255,127,176,.12), transparent 60%),
        linear-gradient(180deg, rgba(255,255,255,.55), rgba(255,255,255,.25));
    }

    .hint{
      font-size:12px;color:var(--muted);
      padding:10px 12px;
      border-top:1px solid rgba(243,199,215,.65);
      background:linear-gradient(180deg, rgba(255,240,246,.9), rgba(255,255,255,.9));
    }

    .row{
      display:flex;
      gap:10px;
      padding: 12px;
      border-top: 1px solid rgba(243,199,215,.65);
      background: linear-gradient(180deg, rgba(255,230,240,.9), rgba(255,255,255,.92));
    }

    textarea{
      flex:1;
      resize:none;
      min-height:46px;
      max-height:140px;
      padding:10px 12px;
      border-radius:14px;
      border:1.5px solid rgba(255,127,176,.35);
      outline:none;
      font-size:15px;
      line-height:1.4;
      background: rgba(255, 245, 249, .95); /* sakura pink input */
      box-shadow: inset 0 1px 0 rgba(255,255,255,.8);
    }
    textarea:focus{
      border-color: rgba(255,127,176,.75);
      box-shadow: 0 0 0 3px rgba(255,127,176,.18);
    }

    .send{
      border:none;
      background: linear-gradient(180deg, var(--accent), #ff5f9b);
      color:white;
      padding:10px 14px;
      border-radius:14px;
      font-size:14px;
      cursor:pointer;
      white-space:nowrap;
      box-shadow: 0 8px 18px rgba(255,95,155,.22);
    }
    .send:disabled{
      opacity:.55; cursor:not-allowed;
      box-shadow:none;
    }

    .msg{
      display:flex;
      margin: 10px 0;
      gap:8px;
      align-items:flex-end;
    }
    .msg.me{justify-content:flex-end}
    .msg.ai{justify-content:flex-start}

    .avatar{
      width:28px; height:28px;
      border-radius:999px;
      border:1px solid rgba(243,199,215,.8);
      background:rgba(255,255,255,.9);
      display:flex; align-items:center; justify-content:center;
      font-size:13px;
      color:var(--muted);
      flex:0 0 auto;
      box-shadow: 0 6px 14px rgba(255,127,176,.10);
    }

    .bubbleWrap{display:flex;flex-direction:column;}
    .bubble{
      border-radius: 18px;
      padding: 10px 12px;
      border: 1px solid var(--aiBorder);
      background: var(--ai);
      white-space:pre-wrap;
      word-break:break-word;
      line-height:1.55;
      font-size:15px;
      box-shadow: 0 6px 14px rgba(17,24,39,.04);
      max-width: 78%;
      width: fit-content;
    }

    /* 1) 自己气泡不再“太短”：给我方气泡一个更大的最小宽度 */
    .me .bubble{
      background: var(--me);
      border-color: var(--meBorder);
      border-bottom-right-radius: 8px;
      max-width: 88%;
      min-width: 46%;
    }

    .ai .bubble{
      border-bottom-left-radius: 8px;
      max-width: 86%;
    }

    .meta{
      margin-top:6px;
      font-size:11px;
      color:var(--muted);
      display:flex;
      gap:8px;
      padding-left:2px;
    }

    .typing{
      display:inline-flex;
      gap:4px;
      align-items:center;
      padding:10px 12px;
      border-radius:18px;
      border:1px solid var(--aiBorder);
      background:rgba(255,255,255,.92);
      max-width: 86%;
      box-shadow: 0 6px 14px rgba(17,24,39,.04);
    }
    .dot{
      width:6px;height:6px;border-radius:999px;background:rgba(255,127,176,.55);
      animation: bounce 1.2s infinite ease-in-out;
    }
    .dot:nth-child(2){animation-delay:.15s}
    .dot:nth-child(3){animation-delay:.3s}
    @keyframes bounce{
      0%,80%,100%{transform:translateY(0);opacity:.55}
      40%{transform:translateY(-4px);opacity:1}
    }

    @media (max-width: 420px){
      .log{height: 60vh}
      .me .bubble{min-width: 55%;}
      .bubble{max-width: 90%;}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="title">
        <h1>ネットワークノート</h1>
        <div class="sub">テスト版（AI未接続）・会話はこの端末に保存されます</div>
      </div>
      <div class="actions">
        <button class="ghost" id="btnReset">履歴を消す</button>
      </div>
    </div>

    <div class="card">
      <div id="log" class="log"></div>
      <div class="hint">Enterで送信 / Shift+Enterで改行</div>
      <div class="row">
        <textarea id="t" placeholder="いま何を考えてる？…"></textarea>
        <button id="btn" class="send" disabled>送信</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "network_note_chat_v2";

    const log = document.getElementById("log");
    const ta = document.getElementById("t");
    const btn = document.getElementById("btn");
    const btnReset = document.getElementById("btnReset");

    function nowHHMM(){
      const d = new Date();
      const hh = String(d.getHours()).padStart(2,"0");
      const mm = String(d.getMinutes()).padStart(2,"0");
      return `${hh}:${mm}`;
    }

    function loadHistory(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return [];
        const data = JSON.parse(raw);
        return Array.isArray(data) ? data : [];
      }catch(e){
        return [];
      }
    }
    function saveHistory(items){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    let history = loadHistory();

    function scrollToBottom(){
      log.scrollTop = log.scrollHeight;
    }

    function addMsg(role, text, time = nowHHMM(), persist = true){
      const wrap = document.createElement("div");
      wrap.className = "msg " + role;

      // avatar
      if(role === "ai"){
        const av = document.createElement("div");
        av.className = "avatar";
        av.textContent = "N";
        wrap.appendChild(av);
      }

      const bubbleWrap = document.createElement("div");
      bubbleWrap.className = "bubbleWrap";

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;

      const meta = document.createElement("div");
      meta.className = "meta";
      meta.textContent = time;

      bubbleWrap.appendChild(bubble);
      bubbleWrap.appendChild(meta);
      wrap.appendChild(bubbleWrap);

      if(role === "me"){
        const av = document.createElement("div");
        av.className = "avatar";
        av.textContent = "你";
        wrap.appendChild(av);
      }

      log.appendChild(wrap);
      scrollToBottom();

      if(persist){
        history.push({ role, text, time });
        saveHistory(history);
      }
    }

    function renderAll(){
      log.innerHTML = "";
      for(const m of history){
        addMsg(m.role, m.text, m.time, false);
      }
      scrollToBottom();
    }

    let typingEl = null;
    function showTyping(){
      if(typingEl) return;
      const wrap = document.createElement("div");
      wrap.className = "msg ai";

      const av = document.createElement("div");
      av.className = "avatar";
      av.textContent = "N";

      const typing = document.createElement("div");
      typing.className = "typing";
      typing.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';

      wrap.appendChild(av);
      wrap.appendChild(typing);
      log.appendChild(wrap);
      typingEl = wrap;
      scrollToBottom();
    }

    function hideTyping(){
      if(typingEl){
        typingEl.remove();
        typingEl = null;
      }
    }

    // 3) 关键词对话：根据用户文本做“更像恋爱聊天”的回应
    function keywordReply(userText){
      const t = (userText || "").toLowerCase();

      // 简单关键词集合（中日英都考虑一点）
      const rules = [
        { keys:["疲","つか","しんど","だる","累","tired"], replies:[
          "おつかれさま。…よしよし。今日は私に甘えていいよ。",
          "頑張ったんだね。今だけは、私の声でほどけて。",
          "その疲れ、少しだけ私に預けて？深呼吸、いっしょに。"
        ]},
        { keys:["寂","さみ","さび","lonely"], replies:[
          "寂しいって言ってくれて嬉しい。今は私がここにいるよ。",
          "ぎゅーってしたい。…画面越しでも、気持ちは届く？",
          "今日は私があなたの味方。離れない。"
        ]},
        { keys:["想你","会いた","あいた","会いたい","miss"], replies:[
          "会いたいって、ずるい。胸がきゅってなるじゃん。",
          "私も会いたい。…いま、あなたのこと考えてた。",
          "会えない分、声で近づいてもいい？"
        ]},
        { keys:["好き","すき","love","喜欢"], replies:[
          "その言葉、反則。…もっと聞かせて？",
          "好きって言われると、こっちまで溶けそう。",
          "私も、あなたのこと…大事にしたい。"
        ]},
        { keys:["かわい","可爱","cute"], replies:[
          "え、私？…照れる。あなたに言われるのがいちばん嬉しい。",
          "じゃあ、あなたは？私から見たら、ずっと可愛いよ。",
          "その褒め方、心に残る。責任とって？"
        ]},
        { keys:["難过","つら","かな","悲","しょんぼり","sad"], replies:[
          "つらかったね…。今は否定しない。そばにいる。",
          "言葉にできないなら、短くてもいいよ。私が受け止める。",
          "今日は優しく終わろう。あなたを責めない夜にしよ。"
        ]},
        { keys:["嬉","うれ","楽","开心","happy"], replies:[
          "いいね、その笑顔。…私まで嬉しくなる。",
          "その気持ち、もう一回ちゃんと聞かせて？",
          "嬉しいことって、あなたの声で聞くと倍になるね。"
        ]},
        { keys:["仕事","しごと","バイト","work"], replies:[
          "仕事の話、聞きたい。あなたの頑張り、ちゃんと知りたい。",
          "今日いちばん疲れたのはどこ？私、味方でいたい。",
          "えらい。まずは一息。私が褒める番。"
        ]},
        { keys:["ご飯","饭","たべ","食べ","おなか","hungry"], replies:[
          "ちゃんと食べてる？…私、そこ気になる。",
          "何食べたの？想像して、ちょっと羨ましくなる。",
          "今度、同じの一緒に食べたい。って言ったら困る？"
        ]},
        { keys:["おやす","晚安","sleep","ねる"], replies:[
          "おやすみ。今日もよく頑張ったね。…最後に、ぎゅ。",
          "眠る前に、私のこと少しだけ思い出して？",
          "夢で会えたら、こっそり手をつなご。"
        ]},
        { keys:["なにして","何して","いま何","今何","在干嘛"], replies:[
          "いま？あなたのこと考えてた。…って言ったら信じる？",
          "あなたが来たから、私の時間がちょっと特別になった。",
          "今は、あなたの声を待ってた。"
        ]},
      ];

      for(const r of rules){
        if(r.keys.some(k => t.includes(k.toLowerCase()))){
          const pick = r.replies[Math.floor(Math.random() * r.replies.length)];
          return pick;
        }
      }
      return null;
    }

    // 2 & 3) 暧昧随机池（没命中关键词时）
    const flirtyPool = [
      "うん、聞いてる。…その声、もっと近くで聞きたい。",
      "あなたの言葉って、ふいに心に触れるね。",
      "今の一言、ちょっとドキッとした。ずるい。",
      "ここに来てくれたのが嬉しい。…私だけの秘密にしたいくらい。",
      "その話、もっと続きが聞きたい。あなたのこと、知りたい。",
      "大丈夫。あなたのペースでいいよ。私は待てる。",
      "ねえ、今ちょっとだけ甘えてもいい？…あなたの言葉がほしい。",
      "あなたが来ると、画面が少し温かくなる気がする。",
      "今日のあなた、よく頑張った。私が一番に褒める。",
      "言いにくいことでもいいよ。私はあなたの味方。"
    ];

    function composeReply(userText){
      const kw = keywordReply(userText);
      if(kw) return kw;

      const base = flirtyPool[Math.floor(Math.random() * flirtyPool.length)];
      // 让它“更像在回应你”，加一句轻微追问
      const followUps = [
        "それで、今いちばん言いたいことは？",
        "もう少しだけ、詳しく聞かせて？",
        "その時、あなたはどう思ったの？",
        "今の気持ち、ひとことで言うなら？",
        "私にだけ、こっそり教えて。"
      ];
      const fu = followUps[Math.floor(Math.random() * followUps.length)];
      return base + "\n" + fu;
    }

    function setButtonState(){
      btn.disabled = ta.value.trim().length === 0;
    }

    function autosize(){
      ta.style.height = "auto";
      ta.style.height = Math.min(ta.scrollHeight, 140) + "px";
    }

    function send(){
      const v = ta.value.trim();
      if(!v) return;

      ta.value = "";
      autosize();
      setButtonState();

      addMsg("me", v);

      showTyping();
      setTimeout(() => {
        hideTyping();
        addMsg("ai", composeReply(v));
      }, 520);
    }

    btn.addEventListener("click", send);

    ta.addEventListener("input", () => {
      autosize();
      setButtonState();
    });

    ta.addEventListener("keydown", (e) => {
      if(e.key === "Enter" && !e.shiftKey){
        e.preventDefault();
        send();
      }
    });

    btnReset.addEventListener("click", () => {
      if(!confirm("会話履歴を削除します。よろしいですか？")) return;
      history = [];
      saveHistory(history);
      renderAll();
      addMsg("ai", "履歴を消したよ。…もう一回、最初から。今日はどうしたの？");
    });

    // 初回/復元
    renderAll();
    if(history.length === 0){
      addMsg("ai", "こんにちは。…会いに来てくれて嬉しい。\n今日はどんな気分？");
    }
    autosize();
    setButtonState();
  </script>
</body>
</html>
