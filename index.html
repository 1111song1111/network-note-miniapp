<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ネットワークノート</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto;max-width:720px;margin:0 auto;padding:16px;}
    #log{border:1px solid #ddd;border-radius:12px;padding:12px;height:65vh;overflow:auto;background:#fafafa;}
    .row{display:flex;gap:8px;margin-top:12px;}
    input{flex:1;padding:12px;border-radius:10px;border:1px solid #ddd;font-size:16px;}
    button{padding:12px 14px;border-radius:10px;border:1px solid #ddd;background:#fff;font-size:16px;}
    .msg{margin:10px 0;display:flex;}
    .me{justify-content:flex-end;}
    .ai{justify-content:flex-start;}
    .bubble{max-width:80%;padding:10px 12px;border-radius:14px;white-space:pre-wrap;word-break:break-word;}
    .me .bubble{background:#dff7e8;border:1px solid #bfead2;}
    .ai .bubble{background:#fff;border:1px solid #e5e5e5;}
    .hint{color:#666;font-size:12px;margin:8px 2px;}
  </style>
</head>
<body>
  <h3>ネットワークノート</h3>
  <div class="hint">まずはテスト用（疑似返信）。次にAI接続します。</div>

  <div id="log"></div>

  <div class="row">
    <input id="t" placeholder="入力して送信…" />
    <button id="btn">送信</button>
  </div>

  <script>
    const log = document.getElementById('log');
    const input = document.getElementById('t');
    const btn = document.getElementById('btn');

    function add(role, text){
      const wrap = document.createElement('div');
      wrap.className = 'msg ' + role;
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;
      wrap.appendChild(bubble);
      log.appendChild(wrap);
      log.scrollTop = log.scrollHeight;
    }

    function fakeReply(text){
      const replies = [
        "うん、聞いてるよ。",
        "それは大変だったね…。もう少し詳しく教えて？",
        "そばにいるよ。深呼吸しよ。",
        "今日、少しでも楽だった瞬間はあった？"
      ];
      const r = replies[Math.floor(Math.random()*replies.length)];
      return r + "\n（あなたの言葉）" + text;
    }

    function send(){
      const v = input.value.trim();
      if(!v) return;
      input.value = "";
      add("me", v);
      setTimeout(()=>add("ai", fakeReply(v)), 250);
    }

    btn.addEventListener('click', send);
    input.addEventListener('keydown', (e)=>{ if(e.key==="Enter") send(); });

    add("ai","こんにちは。ネットワークノートへようこそ。今日はどうしたの？");
  </script>
</body>
</html>
